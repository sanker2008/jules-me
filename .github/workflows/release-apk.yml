name: Build and Release Android Packages

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Validate JavaScript
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  build-apk:
    name: Build APK (${{ matrix.abi }})
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle memory
        run: |
          {
            echo ''
            echo 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8'
            echo 'org.gradle.parallel=true'
            echo 'org.gradle.daemon=false'
          } >> android/gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        working-directory: android
        run: >-
          ./gradlew assembleRelease --no-daemon
          -PreactNativeArchitectures=${{ matrix.abi }}
          -Pandroid.enableMinifyInReleaseBuilds=false
          -Pandroid.enableShrinkResourcesInReleaseBuilds=false

      - name: Name APK
        env:
          ABI: ${{ matrix.abi }}
        run: |
          version="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk \
            "dist/JulesMe-${version}-${ABI}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JulesMe-${{ matrix.abi }}-${{ github.run_number }}
          path: dist/*.apk
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  build-aab:
    name: Build Android App Bundle
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean

      - name: Configure Gradle memory
        run: |
          {
            echo ''
            echo 'org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8'
            echo 'org.gradle.parallel=true'
            echo 'org.gradle.daemon=false'
          } >> android/gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release AAB
        working-directory: android
        run: >-
          ./gradlew bundleRelease --no-daemon
          -PreactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64
          -Pandroid.enableMinifyInReleaseBuilds=false
          -Pandroid.enableShrinkResourcesInReleaseBuilds=false

      - name: Name AAB
        run: |
          version="${GITHUB_REF_NAME//\//-}"
          mkdir -p dist
          cp android/app/build/outputs/bundle/release/app-release.aab \
            "dist/JulesMe-${version}.aab"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: JulesMe-aab-${{ github.run_number }}
          path: dist/*.aab
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-apk
      - build-aab
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download all Android packages
        uses: actions/download-artifact@v4
        with:
          pattern: JulesMe-*-${{ github.run_number }}
          path: release-assets
          merge-multiple: true

      - name: Publish packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
